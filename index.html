<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Global Neon</title>
    <script src="//unpkg.com/globe.gl"></script>
    <style>
        body {
            background-color: #000;
            color: white;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Seção de Boas-vindas */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            text-shadow: 0 0 10px #fff, 0 0 20px #00f3ff, 0 0 40px #00f3ff;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.5rem;
            text-shadow: 0 0 10px #ff00de, 0 0 20px #ff00de;
            margin-bottom: 30px;
        }

        /* Botão Neon Interativo */
        .btn-neon {
            padding: 15px 30px;
            font-size: 1.2rem;
            color: #00f3ff;
            border: 2px solid #00f3ff;
            background: transparent;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.5s;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            border-radius: 5px;
        }

        .btn-neon:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 10px #00f3ff, 0 0 40px #00f3ff, 0 0 80px #00f3ff;
        }

        /* Container do Globo */
        #globeViz {
            width: 100%;
            height: 80vh;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Olá, Mundo!</h1>
        <p>Acesse o sistema global abaixo.</p>
        
        <button class="btn-neon" onclick="document.getElementById('globeViz').scrollIntoView({behavior: 'smooth'})">
            Acessar o Mundo
        </button>
    </section>

    <div id="globeViz"></div>

    <script>
        const elem = document.getElementById('globeViz');
        const world = Globe()
            (elem)
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('rgba(0,0,0,0)')
            .showAtmosphere(true)
            .atmosphereColor('#00f3ff')
            .arcColor(() => '#00f3ff')
            .polygonCapColor(() => 'rgba(0, 243, 255, 0.15)')
            .polygonStrokeColor(() => '#ff00de');

        // Carrega as fronteiras dos países
        fetch('//unpkg.com/world-atlas/countries-110m.json').then(res => res.json()).then(countries => {
            world.polygonsData(countries.objects.countries.geometries);
        });

        // Ajusta o tamanho se a janela mudar
        window.onresize = () => world.width(window.innerWidth).height(window.innerHeight * 0.8);
    </script>
</body>
</html>
