<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo 3D Experience</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fundo de Estrelas */
        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Botão Estilizado */
        #ui-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            transition: opacity 1s, transform 1s;
        }

        .btn-github {
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,153,0,0.4);
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-github:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255,153,0,0.7);
        }

        .text {
            padding: 15px 25px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #000;
        }

        .brand {
            background: #000;
            padding: 15px 25px;
            color: #ff9900;
            font-weight: 900;
            font-size: 1.2rem;
        }

        /* Canvas do Mundo */
        #world-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease-in;
        }

        .active #ui-layer {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0.5);
        }

        .active #world-canvas {
            opacity: 1;
            pointer-events: all;
        }

        #instrucoes {
            position: absolute;
            bottom: 20px;
            color: white;
            width: 100%;
            text-align: center;
            display: none;
            text-shadow: 0 0 5px #000;
        }
    </style>
</head>
<body>

    <div id="stars-container"></div>

    <div id="ui-layer">
        <button class="btn-github" onclick="startExperience()">
            <span class="text">Olá Mundo</span>
            <span class="brand">GITHUB</span>
        </button>
    </div>

    <canvas id="world-canvas"></canvas>
    <div id="instrucoes">Arraste para girar o mundo</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // Configuração do Universo de Estrelas
        const starsContainer = document.getElementById('stars-container');
        const starCount = 400;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.width = '2px';
            star.style.height = '2px';
            star.style.background = 'white';
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.opacity = Math.random();
            star.style.borderRadius = '50%';
            starsContainer.appendChild(star);
        }

        // Função para iniciar a transição para o Mundo
        function startExperience() {
            document.body.classList.add('active');
            document.getElementById('instrucoes').style.display = 'block';
            init3D();
        }

        // Engine 3D (Three.js)
        function init3D() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('world-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Criando o Globo
            const geometry = new THREE.SphereGeometry(2, 64, 64);
            const material = new THREE.MeshPhongMaterial({
                color: 0x156289,
                emissive: 0x072534,
                side: THREE.DoubleSide,
                flatShading: false,
                wireframe: true // Estilo "holograma/digital"
            });
            const globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            // Iluminação
            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x333333));

            camera.position.z = 5;

            // Interatividade (Mouse)
            let isDragging = false;
            let mouseX = 0, mouseY = 0;

            document.addEventListener('mousedown', () => isDragging = true);
            document.addEventListener('mouseup', () => isDragging = false);
            document.addEventListener('mousemove', (e) => {
                if(isDragging) {
                    globe.rotation.y += e.movementX * 0.005;
                    globe.rotation.x += e.movementY * 0.005;
                }
            });

            // Animação contínua
            function animate() {
                requestAnimationFrame(animate);
                if(!isDragging) {
                    globe.rotation.y += 0.002;
                }
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
