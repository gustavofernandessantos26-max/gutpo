<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador Global - GITHUB Edition</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        html, body, #cesiumContainer {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #000;
        }

        /* Interface do Botão GitHub */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .btn-nav {
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-family: sans-serif;
            transition: 0.3s;
        }

        .btn-nav:hover { transform: translateY(-2px); }

        .text { padding: 10px 15px; font-weight: bold; color: #000; }
        .brand { background: #000; padding: 10px 15px; color: #ff9900; font-weight: 900; }

        /* Menu de Destinos */
        #menu-paises {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,153,0,0.3);
        }

        .dest-btn {
            background: transparent;
            border: 1px solid #ff9900;
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .dest-btn:hover { background: #ff9900; color: #000; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="btn-nav">
            <span class="text">Olá Mundo</span>
            <span class="brand">GITHUB</span>
        </div>
    </div>

    <div id="menu-paises">
        <button class="dest-btn" onclick="flyTo(-22.9519, -43.2105, 1500)">Brasil (Rio)</button>
        <button class="dest-btn" onclick="flyTo(48.8584, 2.2945, 1000)">França (Paris)</button>
        <button class="dest-btn" onclick="flyTo(35.6895, 139.6917, 2000)">Japão (Tokyo)</button>
        <button class="dest-btn" onclick="flyTo(-13.1631, -72.5450, 3000)">Peru (Machu Picchu)</button>
    </div>

    <div id="cesiumContainer"></div>

    <script>
        // Inicializa o Globo com imagens de satélite reais
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(), // Ativa montanhas 3D
            baseLayerPicker: false,
            geocoder: true, // Barra de busca de qualquer lugar do mundo
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            animation: false,
            timeline: false
        });

        // Função de "Voo" cinematográfico para os locais
        function flyTo(lat, lon, height) {
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(lon, lat, height),
                orientation: {
                    heading: Cesium.Math.toRadians(0),
                    pitch: Cesium.Math.toRadians(-35),
                    roll: 0.0
                },
                duration: 4 // Tempo de viagem em segundos
            });
        }

        // Adiciona atmosfera e iluminação dinâmica
        viewer.scene.globe.enableLighting = true;
        viewer.scene.skyAtmosphere.show = true;
    </script>
</body>
</html>
