<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global GITHUB Explorer</title>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* UI Overlay Superior */
        .overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #000;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay:hover { transform: translateX(-50%) scale(1.05); }

        .ola { padding: 12px 20px; font-weight: 800; color: #000; text-transform: uppercase; }
        .github { background: #000; color: #ff9900; padding: 12px 20px; font-weight: 900; }

        /* Controles de Navegação */
        .nav-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .btn-loc {
            background: #000;
            color: #fff;
            border: 1px solid #ff9900;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-loc:hover { background: #ff9900; color: #000; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="overlay" onclick="resetView()">
        <div class="ola">Olá Mundo</div>
        <div class="github">GITHUB</div>
    </div>

    <div class="nav-bar">
        <button class="btn-loc" onclick="flyToLoc([-43.2105, -22.9519])">Brasil</button>
        <button class="btn-loc" onclick="flyToLoc([139.6917, 35.6895])">Japão</button>
        <button class="btn-loc" onclick="flyToLoc([-0.1276, 51.5072])">Londres</button>
    </div>

    <script>
        // Inicialização do Mapa com Estilo Dark Pro (CartoDB)
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [0, 20],
            zoom: 1.5,
            pitch: 45, // Inclinação 3D
            antialias: true
        });

        // Efeito de Rotação Contínua (Auto-Rotate)
        function rotateGlobe() {
            const center = map.getCenter();
            center.lng += 0.2;
            map.setCenter(center);
            requestAnimationFrame(rotateGlobe);
        }

        map.on('load', () => {
            // Adiciona neblina e atmosfera 3D
            map.setFog({
                'range': [0.5, 10],
                'color': '#000000',
                'horizon-blend': 0.1
            });
            
            // Inicia rotação se o zoom for baixo
            rotateGlobe();
        });

        function flyToLoc(coords) {
            map.flyTo({
                center: coords,
                zoom: 12,
                essential: true,
                duration: 5000, // Voo cinematográfico de 5 segundos
                pitch: 60
            });
        }

        function resetView() {
            map.flyTo({
                center: [0, 20],
                zoom: 1.5,
                pitch: 0,
                duration: 3000
            });
        }

        // Interação de Clique para ver detalhes do lugar
        map.on('click', (e) => {
            new maplibregl.Popup()
                .setLngLat(e.lngLat)
                .setHTML(`<div style="color:#000; font-weight:bold; padding:5px;">
                            Explorando: ${e.lngLat.lat.toFixed(2)}, ${e.lngLat.lng.toFixed(2)}
                          </div>`)
                .addTo(map);
        });
    </script>
</body>
</html>
