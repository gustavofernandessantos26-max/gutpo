<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Satellite Pro</title>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* Botão Estilizado GITHUB */
        .header-ui {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #000;
        }

        .label { padding: 12px 20px; font-weight: 700; color: #000; }
        .brand { background: #000; color: #ff9900; padding: 12px 20px; font-weight: 900; }

        /* Rodapé com Localizações */
        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 2;
        }

        .btn {
            background: rgba(0,0,0,0.8);
            color: #ff9900;
            border: 1px solid #ff9900;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover { background: #ff9900; color: #000; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="header-ui" onclick="resetGlobe()">
        <div class="label">OLÁ MUNDO</div>
        <div class="brand">GITHUB</div>
    </div>

    <div class="controls">
        <button class="btn" onclick="goTo([-43.2105, -22.9519])">Rio de Janeiro</button>
        <button class="btn" onclick="goTo([-74.006, 40.7128])">Nova York</button>
        <button class="btn" onclick="goTo([139.6917, 35.6895])">Tóquio</button>
        <button class="btn" onclick="goTo([2.2945, 48.8584])">Paris</button>
    </div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'raster-tiles': {
                        type: 'raster',
                        tiles: [
                            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
                        ],
                        tileSize: 256,
                        attribution: 'Esri Satellite'
                    }
                },
                layers: [{
                    id: 'simple-tiles',
                    type: 'raster',
                    source: 'raster-tiles',
                    minzoom: 0,
                    maxzoom: 18
                }]
            },
            center: [0, 20],
            zoom: 2,
            pitch: 45
        });

        // Função de Voo Cinematográfico
        function goTo(coords) {
            map.flyTo({
                center: coords,
                zoom: 16,
                pitch: 60,
                bearing: -20,
                duration: 6000,
                essential: true
            });
        }

        function resetGlobe() {
            map.flyTo({
                center: [0, 20],
                zoom: 2,
                pitch: 0,
                bearing: 0,
                duration: 4000
            });
        }

        // Adiciona atmosfera de brilho (opcional para estética)
        map.on('load', () => {
            map.setFog({
                "range": [0.8, 8],
                "color": "#000",
                "horizon-blend": 0.1
            });
        });
    </script>
</body>
</html>
