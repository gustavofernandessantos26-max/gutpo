<script>
    const elem = document.getElementById('globeViz');
    
    // Inicializa o Globo
    const world = Globe()
        (elem)
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
        .backgroundColor('rgba(0,0,0,0)')
        .showAtmosphere(true)
        .atmosphereColor('#00f3ff')
        .atmosphereDaylightAlpha(0.1)
        .polygonCapColor(() => 'rgba(0, 243, 255, 0.2)')
        .polygonStrokeColor(() => '#ff00de')
        .polygonSideColor(() => 'rgba(255, 0, 222, 0.1)')
        .onPolygonClick(({ lat, lng }) => {
            // A mágica acontece aqui: Acessa a parte clicada
            world.pointOfView({ lat, lng, altitude: 1.5 }, 1000);
        })
        .controlsByTwoTouch(true); // Melhora uso no celular

    // Carrega os dados geográficos
    fetch('//unpkg.com/world-atlas/countries-110m.json')
        .then(res => res.json())
        .then(countries => {
            world.polygonsData(countries.objects.countries.geometries);
        });

    // Função para redimensionar o globo com a janela
    window.addEventListener('resize', () => {
        world.width(window.innerWidth);
        world.height(window.innerHeight * 0.8);
    });
</script>
