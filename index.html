<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página Neon</title>
    <style>
        /* Definindo o fundo preto e a fonte */
        body {
            background-color: #000; /* Fundo preto total */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Efeito de luz neon no Título (Ciano) */
        h1 {
            font-size: 4rem;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff, 
                0 0 20px #00f3ff, 
                0 0 40px #00f3ff, 
                0 0 80px #00f3ff;
            margin-bottom: 10px;
        }

        /* Efeito de luz neon no Parágrafo (Rosa/Magenta) */
        p {
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #ff00de, 
                0 0 20px #ff00de;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Este é o meu primeiro código em HTML com estilo Neon.</p>
</body>
</html>
