<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão Olá Mundo</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .custom-button {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 0;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .custom-button:hover {
            transform: scale(1.05);
        }

        .label-text {
            padding: 15px 20px;
            color: #333;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .brand-box {
            background-color: #000; /* Fundo Preto */
            padding: 15px 20px;
            display: flex;
            align-items: center;
        }

        .brand-text {
            color: #ff9900; /* Laranja */
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: -1px;
        }
    </style>
</head>
<body>

    <button class="custom-button">
        <span class="label-text">Olá Mundo</span>
        <div class="brand-box">
            <span class="brand-text">GITHUB</span>
        </div>
    </button>

</body>
</html>
