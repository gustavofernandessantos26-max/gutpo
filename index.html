<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo - Versão Ultra</title>
    <style>
        /* Reset e Fontes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Estrutura do Botão */
        .btn-container {
            display: flex;
            align-items: stretch;
            background: #f4f4f4;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-decoration: none;
        }

        .btn-container:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 153, 0, 0.2);
            border-color: #ff9900;
        }

        /* Lado Esquerdo: Olá Mundo */
        .text-section {
            padding: 20px 30px;
            color: #111;
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            background: white;
        }

        /* Lado Direito: GITHUB (Estilo Específico) */
        .brand-section {
            background-color: #000;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            position: relative;
            min-width: 160px;
            justify-content: center;
        }

        .brand-text {
            color: #ff9900;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        /* Detalhe de Brilho no Hover */
        .brand-section::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .btn-container:hover .brand-section::after {
            left: 100%;
        }

    </style>
</head>
<body>

    <a href="https://github.com" class="btn-container">
        <div class="text-section">
            Olá Mundo
        </div>
        <div class="brand-section">
            <span class="brand-text">GITHUB</span>
        </div>
    </a>

</body>
</html>
